<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mboiz Stream Nexus - Dashboard</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-blue: #00D2FF;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .navbar {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-bg);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--accent-blue);
        }
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .hero {
            text-align: center;
            padding: 4rem 0;
            background: radial-gradient(circle at center, rgba(0, 210, 255, 0.1) 0%, transparent 70%);
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .hero p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }
        .stat-card {
            background: var(--glass-bg);
            padding: 2rem;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
        }
        .stat-card h3 {
            margin-top: 0;
            opacity: 0.6;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-blue);
        }
        .footer {
            text-align: center;
            padding: 2rem;
            opacity: 0.5;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">Mboiz Stream Nexus</div>
        <div class="nav-links">
            <span id="session-id">Session: LOADING...</span>
        </div>
    </nav>
    <div class="hero">
        <h1>Welcome to Mboiz Stream Nexus</h1>
        <p>Premium streaming dashboard for professional creators.</p>
    </div>
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Active Viewers</h3>
                <div class="value">1,234</div>
            </div>
            <div class="stat-card">
                <h3>Stream Health</h3>
                <div class="value">EXCELLENT</div>
            </div>
            <div class="stat-card">
                <h3>Uptime</h3>
                <div class="value">04:20:00</div>
            </div>
        </div>
    </div>
    <footer class="footer">
        &copy; 2026 Mboiz Creative. All rights reserved.
    </footer>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const session = urlParams.get('session') || 'GUEST';
        document.getElementById('session-id').textContent = 'Session: ' + session;
    </script>
</body>
</html>
